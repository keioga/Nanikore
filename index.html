<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google MediaPipe カメラ認識 PWA</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/vision_bundle.js" crossorigin="anonymous"></script>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 0; padding: 20px; background: #f0f2f5; }
        .container { position: relative; width: 100%; max-width: 500px; margin: 0 auto; }
        #video { width: 100%; border-radius: 8px; }
        /* 認識したものを囲む枠のスタイル */
        .highlighter {
            position: absolute;
            border: 3px solid #00df89;
            background: rgba(0, 223, 137, 0.1);
            z-index: 2;
            box-sizing: border-box;
            border-radius: 4px;
            pointer-events: none; /* クリックを邪魔しない */
        }
        .label {
            position: absolute;
            top: -25px; left: -3px;
            background: #00df89; color: #000;
            font-weight: bold; font-size: 14px;
            padding: 2px 6px; border-radius: 4px 4px 0 0;
            white-space: nowrap;
        }
        #status { color: #666; margin-bottom: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <h2>Google MediaPipe 物体認識アプリ</h2>
    <div id="status">Google AIモデルを初期化中...</div>
    
    <div class="container" id="container">
        <video id="video" autoplay playsinline></video>
    </div>

    <script type="module">
        // MediaPipeの読み込み準備
        const vision = await FilesetResolver.forVisionTasks(
            "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/wasm"
        );
        
        const video = document.getElementById('video');
        const statusDiv = document.getElementById('status');
        const container = document.getElementById('container');
        let objectDetector;
        let children = [];

        // 1. カメラ起動
        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' },
                    audio: false
                });
                video.srcObject = stream;
                return new Promise((resolve) => video.onloadedmetadata = () => resolve(video));
            } catch (e) {
                statusDiv.innerText = "カメラの起動に失敗しました: " + e.message;
            }
        }

        // 2. AIモデルの初期化
        async function initAI() {
            await setupCamera();
            
            try {
                // Googleの提供する高精度モデル（EfficientDet）を読み込み
                objectDetector = await ObjectDetector.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/object_detector/efficientdet_lite0/float16/1/efficientdet_lite0.tflite",
                        delegate: "GPU"
                    },
                    scoreThreshold: 0.5, // 確実性が50%以上のものだけ表示
                    runningMode: "VIDEO"
                });
                
                statusDiv.innerText = "準備完了！カメラに物を映してください。";
                predictLoop();
            } catch (e) {
                statusDiv.innerText = "AIの読み込みに失敗しました: " + e.message;
                console.error(e);
            }
        }

        // 英語の判定名を簡易的に日本語に変換する辞書（よく映るもの）
        const jaLabels = {
            "person": "人", "bicycle": "自転車", "car": "車", "motorcycle": "バイク",
            "backpack": "リュック", "umbrella": "傘", "handbag": "ハンドバッグ", "tie": "ネクタイ",
            "suitcase": "スーツケース", "bottle": "ボトル・コップ", "wine glass": "グラス",
            "cup": "カップ", "fork": "フォーク", "knife": "ナイフ", "spoon": "スプーン",
            "bowl": "ボウル・お皿", "banana": "バナナ", "apple": "リンゴ", "sandwich": "サンドイッチ",
            "orange": "オレンジ", "broccoli": "ブロッコリー", "carrot": "ニンジン", "hot dog": "ホットドッグ",
            "pizza": "ピザ", "donut": "ドーナツ", "cake": "ケーキ", "chair": "椅子",
            "couch": "ソファ", "potted plant": "観葉植物", "bed": "ベッド", "dining table": "机",
            "tv": "テレビ", "laptop": "ノートパソコン", "mouse": "マウス", "remote": "リモコン",
            "keyboard": "キーボード", "cell phone": "スマホ", "microwave": "電子レンジ",
            "oven": "オーブン", "toaster": "トースター", "sink": "流し台", "refrigerator": "冷蔵庫",
            "book": "本", "clock": "時計", "vase": "花瓶", "scissors": "ハサミ",
            "teddy bear": "ぬいぐるみ", "hair drier": "ドライヤー", "toothbrush": "歯ブラシ"
        };

        // 3. ループ認識＆画面への枠付け描写
        let lastTime = -1;
        async function predictLoop() {
            if (video.currentTime !== lastTime && video.readyState === video.HAVE_ENOUGH_DATA) {
                lastTime = video.currentTime;
                
                // AIに現在のフレームを解析させる
                const startTimeMs = performance.now();
                const detections = objectDetector.detectForVideo(video, startTimeMs).detections;
                
                // 古い枠を一度全部消す
                for (let i = 0; i < children.length; i++) {
                    container.removeChild(children[i]);
                }
                children.splice(0);

                // 見つかった物体ごとに枠を作る
                for (let detection of detections) {
                    const score = Math.round(detection.categories[0].score * 100);
                    const englishLabel = detection.categories[0].categoryName;
                    // 辞書にあれば日本語、なければ英語のまま表示
                    const labelText = jaLabels[englishLabel] || englishLabel;

                    // 画面上の位置を計算
                    const videoWidth = video.offsetWidth;
                    const videoHeight = video.offsetHeight;
                    
                    // MediaPipeの座標比率から実際のピクセル数を計算
                    const boundingBox = detection.boundingBox;
                    const left = (boundingBox.originX / video.videoWidth) * videoWidth;
                    const top = (boundingBox.originY / video.videoHeight) * videoHeight;
                    const width = (boundingBox.width / video.videoWidth) * videoWidth;
                    const height = (boundingBox.height / video.videoHeight) * videoHeight;

                    // 枠（緑のボックス）のHTML要素を動的に生成
                    const highlighter = document.createElement('div');
                    highlighter.setAttribute('class', 'highlighter');
                    highlighter.style.left = `${left}px`;
                    highlighter.style.top = `${top}px`;
                    highlighter.style.width = `${width}px`;
                    highlighter.style.height = `${height}px`;

                    // ラベル（文字部分）のHTML要素を生成
                    const label = document.createElement('p');
                    label.setAttribute('class', 'label');
                    label.innerText = `${labelText} (${score}%)`;
                    
                    highlighter.appendChild(label);
                    container.appendChild(highlighter);
                    children.push(highlighter);
                }
            }
            window.requestAnimationFrame(predictLoop);
        }

        // 起動
        initAI();
    </script>
</body>
</html>
