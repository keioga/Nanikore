<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AO入試デモ：エッジAIカメラ</title>
    <!-- ① バージョンを固定して確実にGoogleからAIを読み込む -->
    <script src="https://jsdelivr.net"></script>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 0; padding: 20px; background: #f5f5f5; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        video { width: 100%; border-radius: 10px; background: #000; }
        #result { font-size: 24px; font-weight: bold; color: #007bff; margin-top: 15px; min-height: 36px; }
        #status { color: #666; font-size: 14px; margin-bottom: 15px; background: #eee; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>エッジAI 画像解析デモ</h2>
        <!-- 進行状況をリアルタイムで表示する窓 -->
        <div id="status">【1】アプリ起動、初期化中...</div>
        
        <video id="webcam" autoplay playsinline muted></video>
        
        <div id="result">---</div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const resultDiv = document.getElementById('result');
        const statusDiv = document.getElementById('status');
        let model;

        function logStatus(text) {
            statusDiv.innerText = text;
        }

        async function startApp() {
            try {
                logStatus("【2】カメラの起動をスマホに要求中...");
                
                const constraints = {
                    video: { facingMode: "environment" },
                    audio: false
                };
                
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                
                // 映像が読み込まれて再生が始まるのを待つ
                await new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        video.play();
                        resolve();
                    };
                });

                logStatus("【3】AIモデルの読み込み中（あと5秒ほどで終わります）...");
                // AIのロード
                model = await mobilenet.load();
                
                logStatus("【4】AI起動完了！カメラに物を映してください。");
                predictLoop();

            } catch (err) {
                logStatus("【エラー発生】: " + err.message + "\n※通常のブラウザ（SafariやChrome）で開き、カメラを許可してください。");
                resultDiv.innerText = "起動失敗";
            }
        }

        async function predictLoop() {
            try {
                if (model && video.readyState === 4) {
                    // AIにカメラの映像を解析させる
                    const predictions = await model.classify(video);
                    
                    if (predictions && predictions.length > 0) {
                        // 【修正箇所】配列の0番目（一番確率が高い結果）を正しく指定
                        const topResult = predictions[0].className;
                        const probability = Math.round(predictions[0].probability * 100);
                        
                        // 画面に判定したモノの名前と確率を出す
                        resultDiv.innerText = `${topResult} (${probability}%)`;
                    }
                }
            } catch (e) {
                // エラーが起きてもアプリ全体が止まらないように安全弁を設置
                console.error("ループエラー:", e);
            }
            // 次のフレームの解析へ
            requestAnimationFrame(predictLoop);
        }

        // 画面が読み込まれたらスタート
        window.addEventListener('load', startApp);
    </script>
</body>
</html>
