<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIカメラ認識 PWA</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 0; padding: 20px; background: #f0f2f5; }
        #video { width: 100%; max-width: 400px; border-radius: 8px; transform: scaleX(1); }
        #result { font-size: 1.2rem; font-weight: bold; margin-top: 15px; color: #333; }
        #status { color: #666; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h2>AIカメラ認識アプリ</h2>
    <div id="status">AIモデルを読み込み中...</div>
    <video id="video" autoplay playsinline></video>
    <div id="result">ここに認識結果が出ます</div>

    <script>
        const video = document.getElementById('video');
        const statusDiv = document.getElementById('status');
        const resultDiv = document.getElementById('result');
        let model;

        // 1. カメラの起動
        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }, // 背面カメラを優先
                    audio: false
                });
                video.srcObject = stream;
                return new Promise((resolve) => {
                    video.onloadedmetadata = () => resolve(video);
                });
            } catch (e) {
                statusDiv.innerText = "カメラの起動に失敗しました。詳細: " + e.message;
            }
        }

        // 2. AIモデルの読み込みと連続認識
        async function main() {
            await setupCamera();
            statusDiv.innerText = "カメラ起動完了。AIモデルを読み込んでいます...";
            
            // MobileNetモデルのロード
            model = await mobilenet.load();
            statusDiv.innerText = "準備完了！カメラに物を映してください。";

            // リアルタイム認識のループ
            predictLoop();
        }

        async function predictLoop() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                // 画像から予測を実行
                const predictions = await model.classify(video);
                if (predictions.length > 0) {
                    // 最も確率の高い結果を表示（英語で返ってきます）
                    const topResult = predictions[0];
                    const probability = Math.round(topResult.probability * 100);
                    resultDiv.innerText = `これは「${topResult.className}」ですか？ (${probability}%)`;
                }
            }
            // 次のフレームで再実行（ループ）
            requestAnimationFrame(predictLoop);
        }

        // アプリ起動
        main();
    </script>
</body>
</html>
